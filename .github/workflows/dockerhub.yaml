name: dockerhub

on:
  push:
    branches: master

jobs:
  tests:
    uses: ./.github/workflows/run_pytest.yaml

  docker:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5


      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: cltr/cdir-api
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      # The issue: The image is built multiple times (when launching api server; when launching test; before pushing to dockerhub), giving room for inconsistencies/drifts.
      #
      # Possible future improvements:
      # - Build image first (using "docker build" with tag containing ${{ github.sha }}).
      # - Then pass name of this image to docker-compose.ci.yml execution.
      # - Finally push this image to dockerhub.
      - name: "Docker image: build image for tests"
        run: docker compose -f ./tests_docker/docker-compose.ci.yml build

      # also starts depending services (they continue to run)
      - name: "Docker image: run tests"
        run: docker compose -f ./tests_docker/docker-compose.ci.yml run --rm tests

      - name: "Docker image: shutdown stack used for tests"
        if: always()
        run: docker compose -f ./tests_docker/docker-compose.ci.yml down -v

      # Only if tests passed, we continue with building and pushing the image
      # to be uploaded to Dockerhub
      - name: Login to Docker Hub
        # https://github.com/docker/login-action
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
