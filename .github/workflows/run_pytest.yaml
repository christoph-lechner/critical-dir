name: run pytest (reusable workflow)

on:
  workflow_call:

jobs:
  run_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Test with pytest (Tests w/o DBMS)
        run: |
          pytest

      - name: "Bring up PostgreSQL"
        run: |
          docker compose -f tests/docker/docker-compose.ci-pytest.yml up -d --wait --wait-timeout 60
      - name: Test with pytest (Tests with DBMS)
        env:
          TESTS_PG_DSN: postgres://testuser:testpwd@localhost:15432/testdb
          TESTS_DO_NOT_DROP: 1
        run: |
          pytest
      - name: "Shut down PostgreSQL"
        if: always()
        run: |
          docker compose -f tests/docker/docker-compose.ci-pytest.yml down -v
