x-ing-env: &ing-env
  # Note: do not quote the DSN.
  CRITICAL_DIR_PG_DSN: postgres://testuser:testpwd@pgdatabase:5432/testdb
  CRITICAL_DIR_DATATABLE: criticalmaps_data_test
  CRITICAL_DIR_ARCHIVETABLE: criticalmaps_data_archive_test
  CRITICAL_DIR_QUARANTINETABLE: criticalmaps_data_quarantine_test
  CRITICAL_DIR_STATSTABLE: criticalmaps_stats_test
  CRITICAL_DIR_REDIS_HOST: redis

  # Remember: These paths to be specified as seen from inside the running Docker container.
  CRITICAL_DIR_IMG_DIR: /app/objs
  CRITICAL_DIR_API_DOWNLOADER_JSON_OUTDIR: /stor

x-ing: &ing
  # to make it more explicit, 'depends_on' and 'command' are not NOT part of this block
  build:
    context: ../../
    dockerfile: Dockerfile.import
  # !Note environment not specified here, it will be added when assembling everything!
  volumes:
    - stor:/stor
  healthcheck:
    disable: true

# Named volume for sharing downloaded data files between containers for further examination,
# These are persistent, use
#    "docker compose down -v"
# to drop data
volumes:
  stor:

services:
  pgdatabase:
    image: postgres:18
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpwd
      - POSTGRES_DB=testdb
    # not exposing ports on host system
    # ports:
    #   - "5432:5432"
    volumes:
      # materials for pre-seeding the DB
      - "./testdata-ing_pg:/docker-entrypoint-initdb.d/"
    tmpfs:
      # put DB on tmpfs to make it forget everything once we shut down
      # -> forces DB to be initialized from sql files every time we run this
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Adjust permissions of data directory -> short-lived service
  init_adjust_permissions:
    image: alpine
    command:
      - sh
      - -c
      - |
        chmod 0777 /stor
    volumes:
      - stor:/stor


  cdir_ing:
    <<: *ing
    environment:
      <<: *ing-env
    # append test-specific argument to ENTRYPOINT given in Dockerfile
    command:
      - --test_one_request
      # !file path as seen from inside Docker container!
      - --override_api_url=file:///app/tests/ing-test-jsons/ok1.json
    depends_on:
      init_adjust_permissions:
        condition: service_completed_successfully
      pgdatabase:
        condition: service_healthy

  ### Test of Idempotency ###
  # Run the Docker image twice against the same table.
  # 'pytest' verifies that it does not affect the outcome.
  cdir_ing_idempotency1:
    <<: *ing
    environment:
      <<: *ing-env
      CRITICAL_DIR_DATATABLE: criticalmaps_data_test_idempotency
      CRITICAL_DIR_ARCHIVETABLE: criticalmaps_data_archive_test_idempotency
      CRITICAL_DIR_QUARANTINETABLE: criticalmaps_data_quarantine_test_idempotency
      CRITICAL_DIR_STATSTABLE: criticalmaps_stats_test_idempotency
    # append test-specific argument to ENTRYPOINT given in Dockerfile
    command:
      - --test_one_request
      # !file path as seen from inside Docker container!
      - --override_api_url=file:///app/tests/ing-test-jsons/ok1.json
    depends_on:
      init_adjust_permissions:
        condition: service_completed_successfully
      pgdatabase:
        condition: service_healthy

  cdir_ing_idempotency2:
    <<: *ing
    environment:
      <<: *ing-env
      # same as above
      CRITICAL_DIR_DATATABLE: criticalmaps_data_test_idempotency
      CRITICAL_DIR_ARCHIVETABLE: criticalmaps_data_archive_test_idempotency
      CRITICAL_DIR_QUARANTINETABLE: criticalmaps_data_quarantine_test_idempotency
      CRITICAL_DIR_STATSTABLE: criticalmaps_stats_test_idempotency
    # append test-specific argument to ENTRYPOINT given in Dockerfile
    command:
      - --test_one_request
      # !file path as seen from inside Docker container!
      - --override_api_url=file:///app/tests/ing-test-jsons/ok1.json
    depends_on:
      init_adjust_permissions:
        condition: service_completed_successfully
      pgdatabase:
        condition: service_healthy
      cdir_ing_idempotency1:
        # ensures that the two idempotency tests run sequentially
        condition: service_completed_successfully


  ### Test with bad files ###
  cdir_ing_badlat:
    <<: *ing
    environment:
      <<: *ing-env
      CRITICAL_DIR_DATATABLE: criticalmaps_data_test_badlat
      CRITICAL_DIR_ARCHIVETABLE: criticalmaps_data_archive_test_badlat
      CRITICAL_DIR_QUARANTINETABLE: criticalmaps_data_quarantine_test_badlat
      CRITICAL_DIR_STATSTABLE: criticalmaps_stats_test_badlat
    # append test-specific argument to ENTRYPOINT given in Dockerfile
    command:
      - --test_one_request
      # !file path as seen from inside Docker container!
      - --override_api_url=file:///app/tests/ing-test-jsons/bad-invalid-lat.json
    depends_on:
      init_adjust_permissions:
        condition: service_completed_successfully
      pgdatabase:
        condition: service_healthy

  cdir_ing_badlng:
    <<: *ing
    environment:
      <<: *ing-env
      CRITICAL_DIR_DATATABLE: criticalmaps_data_test_badlng
      CRITICAL_DIR_ARCHIVETABLE: criticalmaps_data_archive_test_badlng
      CRITICAL_DIR_QUARANTINETABLE: criticalmaps_data_quarantine_test_badlng
      CRITICAL_DIR_STATSTABLE: criticalmaps_stats_test_badlng
    # append test-specific argument to ENTRYPOINT given in Dockerfile
    command:
      - --test_one_request
      # !file path as seen from inside Docker container!
      - --override_api_url=file:///app/tests/ing-test-jsons/bad-invalid-lng.json
    depends_on:
      init_adjust_permissions:
        condition: service_completed_successfully
      pgdatabase:
        condition: service_healthy

  ### Test with bad URL ###
  cdir_ing_badurl:
    <<: *ing
    environment:
      <<: *ing-env
      CRITICAL_DIR_DATATABLE: criticalmaps_data_test_badurl
      CRITICAL_DIR_ARCHIVETABLE: criticalmaps_data_archive_test_badurl
      CRITICAL_DIR_QUARANTINETABLE: criticalmaps_data_quarantine_test_badurl
      CRITICAL_DIR_STATSTABLE: criticalmaps_stats_test_badurl
    # Need to clear ENTRYPOINT given in Dockerfile
    entrypoint: []
    command:
      - /bin/sh
      - -c
      # Two remarks:
      # 1) The provided URL is broken BY PURPOSE, returning expired SSL cert. See https://badssl.com/ for more infos.
      # 2) As docker compose only supports waiting for successful execution of other
      #    services, we need to "flip" the exit code.
      #  v That's what the "!" in the shell command line is for (for the bad URL,
      #  v the command is expected to stop with exit code 1)
      - "! critical-dir-apiimport --status_port=8080 --test_one_request --override_api_url=https://expired.badssl.com/"
    depends_on:
      init_adjust_permissions:
        condition: service_completed_successfully
      pgdatabase:
        condition: service_healthy


  ### Run Analysis of Tests ###
  # Base parameters are identical
  tests:
    build:
      context: ../../
      dockerfile: Dockerfile.import
    environment:
      # Note: do not quote the DSN.
      - CRITICAL_DIR_PG_DSN=postgres://testuser:testpwd@pgdatabase:5432/testdb
      - CRITICAL_DIR_DATATABLE=criticalmaps_data_test
      - CRITICAL_DIR_ARCHIVETABLE=criticalmaps_data_archive_test
      - CRITICAL_DIR_QUARANTINETABLE=criticalmaps_data_quarantine_test
      - CRITICAL_DIR_STATSTABLE=criticalmaps_stats_test
      - CRITICAL_DIR_REDIS_HOST=redis

      # Remember: These paths to be specified as seen from inside the running Docker container.
      - CRITICAL_DIR_IMG_DIR=/app/objs
      - CRITICAL_DIR_API_DOWNLOADER_JSON_OUTDIR=/stor
    profiles:
      # specifying 'profiles' prevents this from launching when 'docker compose up -d' is issued
      - onlytest
    entrypoint:
      - pytest
      # there are issues with pytest's cache because of permissions (can't write to /app)
      - -p no:cacheprovider
      - /app/tests/docker-ing/
    volumes:
      - stor:/stor:ro
    depends_on:
      pgdatabase:
        condition: service_healthy
      init_adjust_permissions:
        condition: service_completed_successfully
      cdir_ing:
        condition: service_completed_successfully
      cdir_ing_idempotency1:
        condition: service_completed_successfully
      cdir_ing_idempotency2:
        condition: service_completed_successfully
      cdir_ing_badlat:
        condition: service_completed_successfully
      cdir_ing_badlng:
        condition: service_completed_successfully
      cdir_ing_badurl:
        condition: service_completed_successfully
