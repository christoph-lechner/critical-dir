# For local development of tests:
# To bring this file up, run
#    docker compose -f docker-compose.ci.yml up
services:
  pgdatabase:
    image: postgres:18
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpwd
      - POSTGRES_DB=testdb
    # not exposing ports on host system
    # ports:
    #   - "5432:5432"
    volumes:
      # materials for pre-seeding the DB
      - "./testdata_pg:/docker-entrypoint-initdb.d/"
    tmpfs:
      # put DB on tmpfs to make it forget everything once we shut down
      # -> forces DB to be initialized from sql files every time we run this
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    container_name: redis
    # not exposing ports on host system
    # ports:
    # - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  # Note: there is another service definition in this file, with identical settings except credentials for HTTP auth
  cdir_api_server:
    build:
      context: ../../
      dockerfile: Dockerfile.api
    environment:
      # Note: do not quote the DSN.
      - CRITICAL_DIR_PG_DSN=postgres://testuser:testpwd@pgdatabase:5432/testdb
      - CRITICAL_DIR_DATATABLE=criticalmaps_data_test
      - CRITICAL_DIR_QUARANTINETABLE=criticalmaps_data_quarantine_test
      # stats table is not relevant for API server, but parameters is needed as of 2026-06-29
      - CRITICAL_DIR_STATSTABLE=criticalmaps_stats_test
      - CRITICAL_DIR_REDIS_HOST=redis

      # Remember: These paths to be specified as seen from inside the running Docker container.
      - CRITICAL_DIR_IMG_DIR=/app/objs
      - CRITICAL_DIR_API_DOWNLOADER_JSON_OUTDIR=/app/not_used_for_test/
      # currently unlocks manipulation of some parameters via URL
      - CRITICAL_DIR_TEST_MODE=1
      # here, HTTP credentials are left undefined
    # exposing port on host system -> needed for test development
    ports:
      - "8081:8081"
    depends_on:
      pgdatabase:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Clone of above service, with HTTP credentials defined -> login should work
  # !ONLY FOR TESTS, we run two instances of the server sharing the same DB and redis server!
  cdir_api_server_with_auth:
    build:
      context: ../../
      dockerfile: Dockerfile.api
    environment:
      # Note: do not quote the DSN.
      - CRITICAL_DIR_PG_DSN=postgres://testuser:testpwd@pgdatabase:5432/testdb
      - CRITICAL_DIR_DATATABLE=criticalmaps_data_test
      - CRITICAL_DIR_QUARANTINETABLE=criticalmaps_data_quarantine_test
      # stats table is not relevant for API server, but parameters is needed as of 2026-06-29
      - CRITICAL_DIR_STATSTABLE=criticalmaps_stats_test
      - CRITICAL_DIR_REDIS_HOST=redis

      # Remember: These paths to be specified as seen from inside the running Docker container.
      - CRITICAL_DIR_IMG_DIR=/app/objs
      - CRITICAL_DIR_API_DOWNLOADER_JSON_OUTDIR=/app/not_used_for_test/
      # currently unlocks manipulation of some parameters via URL
      - CRITICAL_DIR_TEST_MODE=1
      #
      - CRITICAL_DIR_HTTP_USERNAME=johndoe
      - CRITICAL_DIR_HTTP_PASSWORD=pwd
    # exposing port on host system -> needed for test development
    ports:
      - "8082:8081"
    depends_on:
      pgdatabase:
        condition: service_healthy
      redis:
        condition: service_healthy

  # for tests: base parameters are identical to API server config
  tests:
    build:
      context: ../../
      dockerfile: Dockerfile.api
    environment:
      - TEST_APIURL=http://cdir_api_server:8081/
      - TEST_APIURL_AUTH=http://cdir_api_server_with_auth:8081/
    profiles:
      # specifying 'profiles' prevents this from launching when 'docker compose up -d' is issued
      - onlytest
    entrypoint:
      - pytest
      # there are issues with pytest's cache because of permissions (can't write to /app)
      - -p no:cacheprovider
      - /app/tests/docker/
    depends_on:
      pgdatabase:
        condition: service_healthy
      cdir_api_server:
        condition: service_healthy
      cdir_api_server_with_auth:
        condition: service_healthy
      redis:
        condition: service_healthy
